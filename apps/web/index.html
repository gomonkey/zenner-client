<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenner</title>
    <!-- Anti-Flash Theme Script: runs before React mounts to prevent FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('zenner-theme');
          var pref = stored ? JSON.parse(stored).state?.theme : null;
          var resolved =
            pref === 'dark' ? 'dark' :
            pref === 'light' ? 'light' :
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.classList.add(resolved);
        } catch (e) {
          // Fallback: no theme class applied (light by default)
        }
      })();
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-background text-foreground font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
